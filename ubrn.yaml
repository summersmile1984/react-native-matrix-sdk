---
crate:
  repo: https://github.com/matrix-org/matrix-rust-sdk
  rev: 1c44fb66214667c6d00acaf72ab592493653708b # matrix-sdk-0.18.0
  manifestPath: bindings/matrix-sdk-ffi/Cargo.toml
android:
  cargoExtras: []
  directory: android
  native_bindings_dir: kotlin
  useSharedLibrary: true
  jniLibs: src/main/jniLibs
  targets:
    - arm64-v8a
    - armeabi-v7a
ios:
  cargoExtras: []
  directory: ios
  native_bindings_dir: swift
  targets:
    - aarch64-apple-ios
    - aarch64-apple-ios-sim
    - x86_64-apple-ios
  xcodebuildExtras: []
  frameworkName: build/RnMatrixRustSdk
noOverwrite:
  - "android/build.gradle"
turboModule:
  cpp: cpp
  ts: src
bindings:
  cpp: cpp/generated
  ts: src/generated
